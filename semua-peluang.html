    <style>

<body class="bg-gray-50 text-gray-800 antialiased font-sans">

    <nav class="bg-white shadow-sm p-5 sticky top-0 z-50 border-b border-gray-100">
        <div class="container mx-auto flex justify-between items-center text-sm">
            <a href="index.html" class="flex items-center text-blue-900 font-semibold hover:text-blue-700 transition">
                <i class="fas fa-arrow-left mr-2"></i> Kembali ke Beranda
            </a>
            <h2 class="font-bold text-blue-900 tracking-tight text-base">EduCorner Katalog</h2>
        </div>
    </nav>

    <header class="bg-blue-900 text-white py-14 mb-10">
        <div class="container mx-auto px-6 text-center">
            <h1 class="text-3xl md:text-4xl font-bold mb-2 tracking-tight">Semua Peluang & Informasi</h1>
            <p class="text-blue-100 font-light text-sm md:text-base max-w-md mx-auto">Daftar lengkap beasiswa, magang, dan pelatihan untuk masa depanmu.</p>
        </div>
    </header>

    <section class="container mx-auto px-6 mb-8 text-sm">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 grid grid-cols-1 md:grid-cols-4 gap-4">
            <div>
                <label class="block text-[11px] font-bold uppercase text-gray-400 tracking-wider mb-2">Cari Kata Kunci</label>
                <input type="text" id="input-search" oninput="aplikasikanFilter()" placeholder="Ketik nama program..." class="w-full p-2.5 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 transition text-gray-700">
            </div>
            <div>
                <label class="block text-[11px] font-bold uppercase text-gray-400 tracking-wider mb-2">Kategori</label>
                <select id="select-kategori" onchange="aplikasikanFilter()" class="w-full p-2.5 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 transition text-gray-600 bg-white">
                    <option value="semua">Semua Kategori</option>
                    <option value="beasiswa">Beasiswa</option>
                    <option value="magang">Magang</option>
                    <option value="pelatihan">Pelatihan</option>
                    <option value="info_pendidikan">Info Pendidikan</option>
                </select>
            </div>
            <div>
                <label class="block text-[11px] font-bold uppercase text-gray-400 tracking-wider mb-2">Jenjang Pendidikan</label>
                <select id="select-jenjang" onchange="aplikasikanFilter()" class="w-full p-2.5 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 transition text-gray-600 bg-white">
                    <option value="semua">Semua Jenjang</option>
                    <option value="sma_smk">SMA / SMK</option>
                    <option value="d3">Diploma (D3)</option>
                    <option value="s1">Sarjana (S1)</option>
                </select>
            </div>
            <div>
                <label class="block text-[11px] font-bold uppercase text-gray-400 tracking-wider mb-2">Lokasi</label>
                <select id="select-lokasi" onchange="aplikasikanFilter()" class="w-full p-2.5 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 transition text-gray-600 bg-white">
                    <option value="semua">Semua Lokasi</option>
                    <option value="dalam_negeri">Dalam Negeri</option>
                    <option value="luar_negeri">Luar Negeri</option>
                </select>
            </div>
        </div>
        <div class="flex justify-between items-center px-2 mt-4">
            <p id="counter-info" class="text-xs text-gray-500 font-medium">Menampilkan 0 peluang</p>
            <button onclick="resetSemuaFilter()" class="text-xs font-semibold text-red-500 hover:text-red-700 transition"><i class="fas fa-sync-alt mr-1"></i> Reset Filter</button>
        </div>
    </section>

    <main class="container mx-auto px-6 pb-20">
        <div id="container-katalog" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
        
        <div id="not-found-state" class="hidden text-center py-16">
            <i class="fas fa-search text-5xl text-gray-300 mb-4"></i>
            <h3 class="text-base font-semibold text-gray-600">Peluang tidak ditemukan</h3>
            <p class="text-gray-400 text-xs mt-1">Cobalah menggunakan kombinasi filter lain atau kata kunci yang berbeda.</p>
        </div>
    </main>

        function getQueryParams() {
            const params = {};
            const search = window.location.search.substring(1);
            if (search) {
                search.split("&").forEach(pair => {
                    const parts = pair.split("=");
                    params[decodeURIComponent(parts[0])] = decodeURIComponent(parts[1]);
                });
            }
            return params;
        }

        function renderKatalog(data) {
            const container = document.getElementById('container-katalog');
            const notFoundState = document.getElementById('not-found-state');
            const counterInfo = document.getElementById('counter-info');
            
            container.innerHTML = '';
            counterInfo.textContent = `Menampilkan ${data.length} peluang`;

            if (data.length === 0) {
                notFoundState.classList.remove('hidden');
                return;
            } else {
                notFoundState.classList.add('hidden');
            }

            data.forEach(item => {
                const card = `
                    <div class="bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-md transition duration-200 border border-gray-100 flex flex-col justify-between h-full">
                        <div class="p-6">
                            <span class="${item.badgeBg} text-[11px] font-semibold px-2.5 py-1 rounded-full uppercase tracking-wider">${item.badgeText}</span>
                            <h3 class="text-lg font-semibold text-gray-800 mt-4 mb-2 leading-snug">${item.title}</h3>
                            <p class="text-xs text-gray-500 flex items-center mb-4 leading-relaxed">
                                <i class="fas fa-university mr-2"></i> ${item.provider}
                            </p>
                        </div>
                        <div class="px-6 pb-6">
                            <div class="flex justify-between items-center text-xs border-t border-gray-50 pt-4">
                                <span class="text-red-500 font-medium"><i class="far fa-clock mr-1"></i> ${item.deadline}</span>
                                <a href="${item.link}" target="_blank" rel="noopener noreferrer" class="text-blue-900 font-semibold hover:underline">Detail</a>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        function aplikasikanFilter() {
            const searchVal = document.getElementById('input-search').value.toLowerCase();
            const kategoriVal = document.getElementById('select-kategori').value;
            const jenjangVal = document.getElementById('select-jenjang').value;
            const lokasiVal = document.getElementById('select-lokasi').value;

            const filteredData = opportunities.filter(item => {
                const cocokSearch = item.title.toLowerCase().includes(searchVal) || 
                                    item.provider.toLowerCase().includes(searchVal);

                const cocokKategori = (kategoriVal === 'semua') || (item.category === kategoriVal);

                const cocokJenjang = (jenjangVal === 'semua') || 
                                     (item.education === jenjangVal) || 
                                     (item.education === 'semua');

                const cocokLokasi = (lokasiVal === 'semua') || (item.location === lokasiVal);

                return cocokSearch && cocokKategori && cocokJenjang && cocokLokasi;
            });

            renderKatalog(filteredData);
        }

        function resetSemuaFilter() {
            document.getElementById('input-search').value = '';
            document.getElementById('select-kategori').value = 'semua';
            document.getElementById('select-jenjang').value = 'semua';
            document.getElementById('select-lokasi').value = 'semua';
            aplikasikanFilter();
        }

        window.onload = function() {
            const params = getQueryParams();

            if (params.kategori) {
                document.getElementById('select-kategori').value = params.kategori;
            }
            if (params.jenjang) {
                document.getElementById('select-jenjang').value = params.jenjang;
            }
            if (params.lokasi) {
                document.getElementById('select-lokasi').value = params.lokasi;
            }

            aplikasikanFilter();
        };
    </script>
