    <header class="bg-blue-900 text-white py-12 mb-10">
        <div class="container mx-auto px-6 text-center">
            <h1 class="text-3xl md:text-4xl font-bold mb-2">Semua Peluang & Informasi</h1>
            <p class="text-blue-100">Daftar lengkap beasiswa, magang, dan pelatihan untuk masa depanmu.</p>
        </div>
    </header>

    <section class="container mx-auto px-6 mb-8">
        <div class="bg-white p-6 rounded-xl shadow-md border border-gray-100 grid grid-cols-1 md:grid-cols-4 gap-4">
            <div>
                <label class="block text-xs font-bold uppercase text-gray-500 mb-2">Cari Kata Kunci</label>
                <input type="text" id="input-search" oninput="aplikasikanFilter()" placeholder="Ketik nama program..." class="w-full p-2.5 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-gray-500 mb-2">Kategori</label>
                <select id="select-kategori" onchange="aplikasikanFilter()" class="w-full p-2.5 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    <option value="semua">Semua Kategori</option>
                    <option value="beasiswa">Beasiswa</option>
                    <option value="magang">Magang</option>
                    <option value="pelatihan">Pelatihan</option>
                    <option value="info_pendidikan">Info Pendidikan</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-gray-500 mb-2">Jenjang Pendidikan</label>
                <select id="select-jenjang" onchange="aplikasikanFilter()" class="w-full p-2.5 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    <option value="semua">Semua Jenjang</option>
                    <option value="sma_smk">SMA / SMK</option>
                    <option value="d3">Diploma (D3)</option>
                    <option value="s1">Sarjana (S1)</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-gray-500 mb-2">Lokasi</label>
                <select id="select-lokasi" onchange="aplikasikanFilter()" class="w-full p-2.5 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    <option value="semua">Semua Lokasi</option>
                    <option value="dalam_negeri">Dalam Negeri</option>
                    <option value="luar_negeri">Luar Negeri</option>
                </select>
            </div>
        </div>
        <div class="flex justify-between items-center px-2">
            <p id="counter-info" class="text-sm text-gray-500 font-medium">Menampilkan 0 peluang</p>
            <button onclick="resetSemuaFilter()" class="text-xs font-bold text-red-500 hover:text-red-700 transition"><i class="fas fa-sync-alt mr-1"></i> Reset Filter</button>
        </div>
    </section>

    <main class="container mx-auto px-6 pb-20">
        <div id="container-katalog" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
        
        <div id="not-found-state" class="hidden text-center py-12">
            <i class="fas fa-search text-5xl text-gray-300 mb-4"></i>
            <h3 class="text-lg font-bold text-gray-600">Peluang tidak ditemukan</h3>
            <p class="text-gray-400 text-sm mt-1">Cobalah menggunakan kombinasi filter lain atau kata kunci yang berbeda.</p>
        </div>
    </main>

        // Ekstrak parameter URL (kategori, jenjang, lokasi)
        function getQueryParams() {
            const params = {};
            const search = window.location.search.substring(1);
            if (search) {
                search.split("&").forEach(pair => {
                    const parts = pair.split("=");
                    params[decodeURIComponent(parts[0])] = decodeURIComponent(parts[1]);
                });
            }
            return params;
        }

        // Render data ke dalam grid kontainer
        function renderKatalog(data) {
            const container = document.getElementById('container-katalog');
            const notFoundState = document.getElementById('not-found-state');
            const counterInfo = document.getElementById('counter-info');
            
            container.innerHTML = '';
            counterInfo.textContent = `Menampilkan ${data.length} peluang`;

            if (data.length === 0) {
                notFoundState.classList.remove('hidden');
                return;
            } else {
                notFoundState.classList.add('hidden');
            }

            data.forEach(item => {
                const card = `
                    <div class="bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-md transition flex flex-col justify-between">
                        <div class="p-6">
                            <span class="${item.badgeBg} text-xs font-bold px-3 py-1 rounded-full uppercase">${item.badgeText}</span>
                            <h3 class="text-xl font-bold mt-4 mb-2">${item.title}</h3>
                            <p class="text-sm text-gray-500 mb-4 flex items-center">
                                <i class="fas fa-university mr-2"></i> ${item.provider}
                            </p>
                        </div>
                        <div class="px-6 pb-6">
                            <div class="flex justify-between items-center text-sm border-t pt-4">
                                <span class="text-red-500 font-medium"><i class="far fa-clock mr-1"></i> Deadline: ${item.deadline}</span>
                                <a href="${item.link}" target="_blank" rel="noopener noreferrer" class="text-blue-900 font-bold hover:underline">Detail</a>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        // Logika utama filtering (Strict Matching)
        function aplikasikanFilter() {
            const searchVal = document.getElementById('input-search').value.toLowerCase();
            const kategoriVal = document.getElementById('select-kategori').value;
            const jenjangVal = document.getElementById('select-jenjang').value;
            const lokasiVal = document.getElementById('select-lokasi').value;

            const filteredData = opportunities.filter(item => {
                // 1. Filter Nama / Penyelenggara
                const cocokSearch = item.title.toLowerCase().includes(searchVal) || 
                                    item.provider.toLowerCase().includes(searchVal);

                // 2. Filter Kategori (Mencocokkan secara mutlak)
                const cocokKategori = (kategoriVal === 'semua') || (item.category === kategoriVal);

                // 3. Filter Jenjang
                const cocokJenjang = (jenjangVal === 'semua') || 
                                     (item.education === jenjangVal) || 
                                     (item.education === 'semua');

                // 4. Filter Lokasi
                const cocokLokasi = (lokasiVal === 'semua') || (item.location === lokasiVal);

                return cocokSearch && cocokKategori && cocokJenjang && cocokLokasi;
            });

            renderKatalog(filteredData);
        }

        // Mereset filter kembali ke pengaturan pabrik
        function resetSemuaFilter() {
            document.getElementById('input-search').value = '';
            document.getElementById('select-kategori').value = 'semua';
            document.getElementById('select-jenjang').value = 'semua';
            document.getElementById('select-lokasi').value = 'semua';
            aplikasikanFilter();
        }

        // Jalankan saat halaman di-load
        window.onload = function() {
            const params = getQueryParams();

            // Set select dropdown berdasarkan parameter URL kiriman Beranda
            if (params.kategori) {
                document.getElementById('select-kategori').value = params.kategori;
            }
            if (params.jenjang) {
                document.getElementById('select-jenjang').value = params.jenjang;
            }
            if (params.lokasi) {
                document.getElementById('select-lokasi').value = params.lokasi;
            }

            // Terapkan filter pertama kali
            aplikasikanFilter();
        };
    </script>
